<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apri in Wimii</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="stylesheet" href="/common.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #F7F7FA;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8ch 2ch 4ch 2ch;
        }
        #main-logo {
            width: 96px;
            height: 96px;
            margin-bottom: 3ch;
            border-radius: 22%;
            box-shadow: 0 8px 24px rgba(255, 107, 107, 0.25);
        }
        h1.title {
            font-size: 1.8rem;
            color: #2D2D2D;
            margin-bottom: 1.5ch;
        }
        p.subtitle {
            font-size: 1rem;
            color: #555;
            max-width: 420px;
            margin-bottom: 4ch;
            line-height: 1.5;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1.2ch;
            width: 100%;
            max-width: 320px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1ch;
            padding: 1.2ch 2ch;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-primary {
            background: #FF6B6B;
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.35);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 16px rgba(255, 107, 107, 0.45);
        }
        .btn-store {
            background: white;
            color: #2D2D2D;
            border: 1px solid #E0E0E0;
        }
        .btn-store:hover {
            background: #FAFAFA;
        }
        .btn .icon {
            width: 20px;
            height: 20px;
            margin: 0;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <main>
        <img id="main-logo" src="/assets/logo.png" alt="Wimii">
        <h1 class="title" id="pageTitle">Apri in Wimii</h1>
        <p class="subtitle" id="pageSubtitle">
            Qualcuno ha condiviso con te un'iniziativa. Aprila nell'app Wimii per dare un'occhiata!
        </p>

        <div class="btn-group">
            <a id="openAppBtn" href="#" class="btn btn-primary">
                Apri nell'app
            </a>
            <a id="iosBtn" href="https://apps.apple.com/it/app/id6758889696" class="btn btn-store">
                <img class="icon" src="/assets/apple.png" alt="">
                Scarica su App Store
            </a>
            <a id="androidBtn" href="https://play.google.com/store/apps/details?id=com.wimii.app" class="btn btn-store">
                <img class="icon" src="/assets/PlayStoreIcon.png" alt="">
                Scarica su Google Play
            </a>
        </div>
    </main>

    <footer>
        <p>&copy; Wimii. All rights reserved.</p>
    </footer>

    <script>
        (function() {
            var path = window.location.pathname || '';
            var match = path.match(/^\/(i|s|e)\/([^\/]+)/);
            var isSharedCard = !!match;

            var ua = navigator.userAgent || '';
            var isIOS = /iPhone|iPad|iPod/i.test(ua);
            var isAndroid = /Android/i.test(ua);

            var titleEl = document.getElementById('pageTitle');
            var subtitleEl = document.getElementById('pageSubtitle');
            var openAppBtn = document.getElementById('openAppBtn');
            var iosBtn = document.getElementById('iosBtn');
            var androidBtn = document.getElementById('androidBtn');

            if (!isSharedCard) {
                titleEl.textContent = 'Pagina non trovata';
                subtitleEl.textContent = 'Ti stiamo riportando alla home...';
                openAppBtn.classList.add('hidden');
                setTimeout(function() {
                    window.location.replace('/');
                }, 1200);
                return;
            }

            var type = match[1];
            var id = match[2];
            var deepLink = 'wimii://' + type + '/' + id;

            openAppBtn.href = deepLink;

            if (isIOS) {
                androidBtn.classList.add('hidden');
            } else if (isAndroid) {
                iosBtn.classList.add('hidden');
            }

            if (isIOS || isAndroid) {
                setTimeout(function() {
                    window.location.href = deepLink;
                }, 100);
            }
        })();
    </script>
</body>
</html>
